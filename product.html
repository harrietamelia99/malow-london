<!DOCTYPE html>

<body>

      <button class="nav__hamburger" id="nav-hamburger" aria-label="Open menu">
        <span></span><span></span><span></span>
      </button>
      <div class="nav__social-cluster">
        <a href="https://www.instagram.com/malowlondon/" class="nav__icon-btn nav__icon-btn--social" target="_blank" rel="noopener noreferrer" aria-label="MALOW London on Instagram">

      </div>
      <a href="favourites.html" class="nav__icon-btn nav__icon-btn--heart" aria-label="Favourites">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      </a>
<a href="shop-all.html" class="nav__cta">Shop All</a>
    </div>
  </div>
</nav>

<div class="mobile-menu" id="mobile-menu">
  <a href="shop-all.html" class="mobile-menu__link">Shop All</a>
  <a href="about.html" class="mobile-menu__link">About Us</a>
  <a href="favourites.html" class="mobile-menu__link">Favourites</a>
</div>

<!-- Breadcrumb — pink band runs to top of viewport behind floating nav -->
<div class="product-breadcrumb">
  <div class="container">
    <p class="product-breadcrumb__text">
      <a href="index.html" class="product-breadcrumb__link">Home</a>
      &nbsp;/&nbsp;
      <a href="shop-all.html" class="product-breadcrumb__link">Shop All</a>
      &nbsp;/&nbsp;
      <span id="breadcrumb-product" class="product-breadcrumb__current">Product</span>
    </p>
  </div>
</div>

<!-- ============================================================
     PRODUCT PAGE - content rendered dynamically from products.js
     Shopify: templates/product.json + sections/product-template.liquid
     ============================================================ -->
<main class="product-page">
  <div class="container">
    <div class="product-page__inner" id="product-page-inner">
      <!-- Populated by initDynamicProduct() in malow.js -->
      <div style="grid-column:1/-1;display:flex;align-items:center;justify-content:center;min-height:400px;">
        <p style="font-size:13px;font-weight:300;color:var(--sunday-slate);letter-spacing:1px;">Loading…</p>
      </div>
    </div>
  </div>
</main>


<!-- "You may also like" -->
<section class="also-like" aria-labelledby="also-like-heading">
  <div class="container">
    <h2 class="also-like__heading" id="also-like-heading">You May Also Like</h2>
    <div class="product-grid" id="also-like-grid">
      <!-- Populated by initDynamicProduct() -->
    </div>
  </div>
</section>


<!-- Footer -->
<footer class="footer">
  <div class="container">
    <div class="footer__inner">
      <div>
        <img src="images/malow-footer-mark.svg" alt="MALOW London" class="footer__monogram-img" width="320" height="300">
      </div>
      <div>
        <p class="footer__col-heading">Explore MALOW</p>
        <ul class="footer__links">
          <li><a href="size-guide.html" class="footer__link">Size Guide</a></li>
          <li><a href="privacy-policy.html" class="footer__link">Privacy Policy</a></li>
          <li><a href="cookies-policy.html" class="footer__link">Cookies Policy</a></li>
        </ul>
      </div>
      <div>

        <ul class="footer__social" role="list">

            <a href="https://www.instagram.com/malowlondon/" class="footer__social-link" target="_blank" rel="noopener noreferrer" aria-label="MALOW London on Instagram">
              <svg class="footer__social-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect width="20" height="20" x="2" y="2" rx="5" ry="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1.25" fill="currentColor" stroke="none"/></svg>

          <li>
            <a href="https://www.facebook.com/malowlondon" class="footer__social-link" target="_blank" rel="noopener noreferrer" aria-label="MALOW London on Facebook">
              <svg class="footer__social-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/></svg>
            </a>
          </li>
        </ul>
      </div>
    </div>
    <div class="footer__bottom">
      <p class="footer__copyright">© 2026 MALOW London. All rights reserved.</p>
      <p class="footer__credit">Made by <a href="https://www.collectivstudio.uk/" target="_blank" rel="noopener noreferrer">Collectiv Studio</a></p>

  </div>

<script src="js/products.js"></script>
<script src="js/malow.js"></script>

</html>
