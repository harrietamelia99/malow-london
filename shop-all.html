<!-- ============================================================
     SHOP ALL - Full filterable product grid
     All 12 styles, filter by occasion
     ============================================================ -->
<main class="collections-page">
  <div class="container">

    <h1 class="collections-page__title">Shop All</h1>

    <!-- Filter pills -->
    <div class="filter-row" role="group" aria-label="Filter by occasion">
      <button class="filter-pill active" data-filter="all">All</button>
      <button class="filter-pill" data-filter="wedding">Wedding</button>
      <button class="filter-pill" data-filter="party">Party</button>
      <button class="filter-pill" data-filter="everyday">Everyday</button>
    </div>

    <!-- Product grid - populated by renderCollectionsGrid() -->
    <div class="product-grid" id="collections-grid">
      <!-- Populated dynamically from products.js -->
    </div>

    <!-- Empty state -->
    <div id="collections-empty" style="display:none;text-align:center;padding:64px 0;">
      <p style="font-size:15px;font-weight:300;color:var(--sunday-slate);margin-bottom:32px;">No styles found in this category - check back soon.</p>
      <button class="btn-pill" onclick="document.querySelector('[data-filter=all]').click()">View All Styles</button>
    </div>

  </div>
</main>
